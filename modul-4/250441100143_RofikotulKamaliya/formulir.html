<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="h-screen">
    <div class="grid md:grid-cols-2 h-full">
        <div class="bg-[#8A38F5] flex justify-center items-center">
            <img src="gambar/1.png" alt="" class="w-100 drop-shadow-xl">
        </div>
        <div class="flex flex-col justify-center px-2">
            <h2 class="text-center font-bold text-xl mb-2">Login</h2>
            <p class="text-center text-sm text-gray-500 mb-8">
                Masukkan Username dan Password Anda
            </p>
            <p id="notifSukses" class="hidden mb-4 text-center bg-[#8A38F5] text-white py-2 rounded-lg">
                Login Berhasil
            </p>
            <form id="formulir" class="max-w-md mx-auto w-full">
                <input type="email" id="email" placeholder="Email Address" class="w-full mb-2 px-4 py-2 rounded bg-gray-100 shadow-md">
                <p id="errorEmail" class="text-red-500 text-sm mb-2 hidden">Email Wajib diisi!</p>
                <input type="password" id="password" placeholder="Password" class="w-full mb-2 px-4 py-2 rounded bg-gray-100 shadow-md">
                <p id="errorPassword" class="text-red-500 text-sm mb-2 hidden">Password Wajib diisi!</p>
                <button type="submit" class="w-full bg-[#FF9335] text-white py-3 rounded mb-4 shadow-md hover:bg-[#E67E22] transition">Login</button>
                <div class="flex items-center my-4">
                    <div class="flex-1 h-px bg-gray-300"></div>
                    <span class="px-3 text-sm text-gray-500">Or Login With</span>
                    <div class="flex-1 h-px bg-gray-300"></div>
                </div>
                <a href="https://accounts.google.com" target="_blank" class="w-full bg-white py-3 rounded flex items-center justify-center gap-2 shadow-md hover:bg-gray-100 transition">
                    <img src="gambar/google.webp" class="w-7">
                    <span class="text-sm">Sign in with Google</span>
                </a>
            </form>
        </div>
    </div>
    <script>
        document.getElementById("formulir").addEventListener("submit", function(e) {
            e.preventDefault();
            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;

            document.getElementById("errorEmail").classList.add("hidden");
            document.getElementById("errorPassword").classList.add("hidden");
            document.getElementById("notifSukses").classList.add("hidden");

            if(email === "") {
                document.getElementById("errorEmail").classList.remove("hidden");
            }

            if(password === "") {
                document.getElementById("errorPassword").classList.remove("hidden");
            }

            if (email !== "" && password !== "") {
                document.getElementById("notifSukses").classList.remove("hidden");

                setTimeout(function () {
                    window.location.href="index.html";
                }, 2000);
            }
        });
    </script>
</body>
</html>
